<!-- ==========================================================================
     HERO SECTION
     ========================================================================== -->

<section class="hero-section" id="inicio">
  <div class="container">
    <div class="hero-grid">
      <!-- LEFT COLUMN -->
      <div class="hero-content">
        <span class="brand-badge">Mersol Sureste</span>

        <h1>
          LÍDERES EN EQUIPOS <br />
          <span class="text-highlight">Y CONSUMIBLES</span> <br />
          INDUSTRIALES
        </h1>

        <p class="hero-tagline">"Somos La Solución a Tus Necesidades Industriales"</p>

        <!-- BUTTONS -->
        <div class="hero-actions">
          <a
            href="https://wa.me/529990000000?text=Hola,%20me%20gustaría%20solicitar%20una%20cotización"
            target="_blank"
            class="btn btn-primary"
            rel="noopener noreferrer"
          >
            COTIZAR AHORA
          </a>
          <button (click)="scrollToSection('nosotros')" class="btn btn-outline">CONÓCENOS</button>
        </div>
      </div>

      <!-- RIGHT COLUMN -->
      <div class="hero-visual">
        <div class="experience-badge">
          <div class="exp-content">
            <span class="exp-number">+10</span>
            <span class="exp-text">Años de<br />Experiencia</span>
          </div>
          <div class="exp-decoration"></div>
        </div>
      </div>
    </div>

    <!-- CATEGORIES -->
    <div class="hero-categories-slot">
      <app-category-carousel></app-category-carousel>
    </div>
  </div>
</section>
