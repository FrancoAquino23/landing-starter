<!-- ==========================================================================
     CATEGORY CAROUSEL COMPONENT (With Safe Navigation Controls)
     ========================================================================== -->
<div class="carousel-container">
  <!-- BACK BUTTON -->
  <button class="nav-btn prev" (click)="scroll(-1, true)" aria-label="Ver categorías anteriores">
    <span class="arrow">&lsaquo;</span>
  </button>

  <div class="carousel-track" #carouselTrack>
    <!-- CATEGORIES CARD -->
    <div
      class="category-card"
      *ngFor="let category of categories"
      [style.--accent-color]="category.color"
    >
      <div class="card-image-wrapper">
        <img [src]="category.image" [alt]="category.title" loading="lazy" class="category-img" />
        <div class="card-overlay"></div>
      </div>

      <div class="card-footer">
        <h3 class="category-title">{{ category.title }}</h3>
        <a [href]="category.link" class="category-link">
          VER PRODUCTOS
          <span class="icon-arrow">&rarr;</span>
        </a>
      </div>

      <div class="color-bar" [ngStyle]="{ 'background-color': category.color }"></div>
    </div>
  </div>

  <!-- FORWARD BUTTON -->
  <button class="nav-btn next" (click)="scroll(1, true)" aria-label="Ver siguientes categorías">
    <span class="arrow">&rsaquo;</span>
  </button>

  <div class="carousel-hint">
    <span>Explora nuestro catálogo</span>
    <div class="scroll-line"></div>
  </div>
</div>
