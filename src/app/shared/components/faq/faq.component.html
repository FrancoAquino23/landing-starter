<!-- ==========================================================================
     FAQ STRUCTURE
     ======================================================================= -->

<section class="faq-section">
  <div class="container">
    <div class="section-header">
      <h2>Preguntas Frecuentes</h2>
      <p>Resolvemos tus dudas principales sobre nuestros servicios y equipos.</p>
    </div>

    <div class="faq-list">
      @for (item of faqs; track item.pregunta; let i = $index) {
        <div class="faq-item" [class.active]="item.isOpen">
          <!-- REVEAL BUTTON -->
          <button
            type="button"
            class="faq-question"
            (click)="toggleFaq(i)"
            [attr.aria-expanded]="item.isOpen"
          >
            <span class="question-text">{{ item.pregunta }}</span>

            <!-- DYNAMIC ICON -->
            <span class="icon" aria-hidden="true">
              {{ item.isOpen ? '−' : '+' }}
            </span>
          </button>

          <!-- ANSWER -->
          @if (item.isOpen) {
            <div class="faq-answer">
              <p>{{ item.respuesta }}</p>
            </div>
          }
        </div>
      } @empty {
        <!-- OPCIONAL -->
        <p class="empty-msg">No hay preguntas disponibles por el momento.</p>
      }
    </div>
  </div>
</section>
